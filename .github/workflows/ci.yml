name: CI Kitte

on:
  push:
    branches: [ main ]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

    - name: Baixar código
      uses: actions/checkout@v3

    - name: Instalar Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Instalar dependências
      run: npm install --legacy-peer-deps

    - name: Rodar lint
      run: npm run lint || true

    - name: Rodar testes
      run: npm test || true

    - name: Build do projeto
      run: npm run build